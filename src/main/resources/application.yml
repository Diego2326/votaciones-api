server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: votaciones-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/votaciones}
    username: ${DB_USERNAME:votaciones}
    password: ${DB_PASSWORD:votaciones}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  docker:
    compose:
      enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
    display-request-duration: true

logging:
  level:
    org.springframework.security: INFO
    com.votaciones.api: INFO

app:
  jwt:
    issuer: ${APP_JWT_ISSUER:votaciones-api}
    secret: ${APP_JWT_SECRET:VGhpc0lzQVN0cm9uZ0RldmVsb3BtZW50U2VjcmV0S2V5Rm9ySldUUm90YXRpb24=}
    access-token-ttl: ${APP_JWT_ACCESS_TTL:PT15M}
    refresh-token-ttl: ${APP_JWT_REFRESH_TTL:P30D}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
