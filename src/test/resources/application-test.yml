spring:
  datasource:
    url: jdbc:h2:mem:votaciones;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  docker:
    compose:
      enabled: false

app:
  jwt:
    issuer: votaciones-api-test
    secret: VGhpc0lzQVRlc3RTZWNyZXRLZXlGb3JTdGFnZU9uZUFjY2Vzc1Rva2VuczEyMw==
    access-token-ttl: PT15M
    refresh-token-ttl: P7D
  cors:
    allowed-origins: http://localhost:3000
