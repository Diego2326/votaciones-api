services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: votaciones-api
    environment:
      SERVER_PORT: 8080
      DB_URL: ${DB_URL}
      APP_CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      APP_CORS_ALLOWED_ORIGIN_PATTERNS: http://localhost:*,http://127.0.0.1:*
    ports:
      - "8080:8080"
